<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Calculadora Básica</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f4f4f4;
      font-family: Arial, sans-serif;
    }

    .calculadora {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      width: 250px;
    }

    #display {
      width: 100%;
      height: 50px;
      margin-bottom: 10px;
      text-align: right;
      font-size: 20px;
      padding: 5px;
    }

    .botoes {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }

    button {
      height: 50px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #e0e0e0;
    }

    button:hover {
      background-color: #d4d4d4;
    }

    .igual {
      background-color: #ff93d2;
      color: white;
    }

    .igual:hover {
      background-color: #ff8fd0;
    }

    .limpar {
      background-color: #f436eb;
      color: white;
    }

    .limpar:hover {
      background-color: #e61dc4;
    }
  </style>
</head>
<body>

  <div class="calculadora">
    <input type="text" id="display" disabled>

    <div class="botoes">
      <button onclick="limpar()" class="limpar">C</button>
      <button onclick="adicionar('/')">/</button>
      <button onclick="adicionar('*')">*</button>
      <button onclick="adicionar('-')">-</button>

      <button onclick="adicionar('7')">7</button>
      <button onclick="adicionar('8')">8</button>
      <button onclick="adicionar('9')">9</button>
      <button onclick="adicionar('+')">+</button>

      <button onclick="adicionar('4')">4</button>
      <button onclick="adicionar('5')">5</button>
      <button onclick="adicionar('6')">6</button>
      <button onclick="calcular()" class="igual">=</button>

      <button onclick="adicionar('1')">1</button>
      <button onclick="adicionar('2')">2</button>
      <button onclick="adicionar('3')">3</button>
      <button onclick="adicionar('0')">0</button>
    </div>
  </div>

  <script>
    function adicionar(valor) {
      document.getElementById("display").value += valor;
    }

    function limpar() {
      document.getElementById("display").value = "";
    }

    function calcular() {
      try {
        document.getElementById("display").value = 
          eval(document.getElementById("display").value);
      } catch {
        alert("Expressão inválida");
      }
    }
  </script>

</body>
</html>
